<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calm Cavanah</title>
    <style>
        :root { --sage: #8DA399; --cream: #FFFFF0; --text: #2C3330; }
        body { margin: 0; background: var(--cream); font-family: 'Georgia', serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header-controls { background: white; padding: 15px; border-bottom: 2px solid var(--sage); display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; }
        .selector-row { display: flex; gap: 10px; }
        
        .viz-container { display: flex; align-items: center; gap: 10px; background: #fdfdfd; padding: 5px 15px; border-radius: 8px; border: 1px solid #eee; }
        #heartbeat-canvas { width: 120px; height: 25px; background: #fff; }

        .btn { padding: 10px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--sage); color: white; }
        .btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        #nudge-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px);
        }
        .nudge-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }

        .prayer-container { flex: 1; overflow-y: auto; padding: 40px 20px; text-align: center; }
        .hebrew-text { direction: rtl; font-size: 2.8rem; line-height: 2.2; max-width: 800px; margin: 0 auto; white-space: pre-wrap; }
        
        .focus-indicator { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .focus-active { background: #4CAF50; box-shadow: 0 0 5px #4CAF50; }
    </style>
</head>
<body>

    <div id="nudge-overlay">
        <div class="nudge-card">
            <h2>Checking in...</h2>
            <p>We haven't noticed any movement. Are you doing okay?</p>
            <button class="btn btn-main" onclick="dismissNudge()">I am here</button>
        </div>
    </div>

    <div class="header-controls">
        <div class="selector-row">
            <select id="nusach" onchange="init()">
                <option value="Siddur_Ashkenaz">Ashkenaz</option>
                <option value="Siddur_Sefard">Sefard</option>
                <option value="Siddur_Edot_HaMizrach">Edot HaMizrach</option>
            </select>
            <div id="dynamic-menus" style="display: flex; gap: 10px;"></div>
        </div>

        <div style="display: flex; gap: 15px; align-items: center;">
            <button class="btn" id="prev" onclick="move(-1)" disabled>BACK</button>
            <button class="btn btn-main" id="open-btn" onclick="loadFirst()" disabled>OPEN PRAYER</button>
            <button class="btn" id="next" onclick="move(1)" disabled>NEXT</button>
        </div>

        <div class="viz-container">
            <div id="focus-dot" class="focus-indicator"></div>
            <canvas id="heartbeat-canvas"></canvas>
            <span style="font-size: 0.7rem; color: #999; font-weight: bold;">FOCUS TRACKING</span>
        </div>
    </div>

    <div class="prayer-container" id="scroll-box">
        <div id="display" class="hebrew-text">בחור תפילה כדי להמשיך.</div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
