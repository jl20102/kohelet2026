<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&display=swap');
        
        body { 
            transition: background-color 5s ease-in-out; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8; 
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* The Breathing Circle */
        .circle {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            animation: breathe 8s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); background: rgba(255, 255, 255, 0.2); }
            50% { transform: scale(1.6); background: rgba(255, 255, 255, 0.6); }
        }

        .text-fade {
            animation: textFade 12s infinite;
            color: #475569;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            font-weight: 300;
        }

        @keyframes textFade {
            0%, 100% { opacity: 0; }
            40%, 60% { opacity: 1; }
        }
    </style>
</head>
<body id="bg">

    <div class="text-center z-10">
        <div class="circle mx-auto mb-20"></div>
        <div id="affirmation" class="text-fade px-6">just be here</div>
    </div>

    <div class="fixed bottom-10 flex gap-4">
        <button onclick="changeColor('#f1f5f9')" class="w-8 h-8 rounded-full bg-slate-100 border border-white shadow-sm"></button>
        <button onclick="changeColor('#f0fdf4')" class="w-8 h-8 rounded-full bg-green-50 border border-white shadow-sm"></button>
        <button onclick="changeColor('#f5f3ff')" class="w-8 h-8 rounded-full bg-violet-50 border border-white shadow-sm"></button>
        <button onclick="changeColor('#fff7ed')" class="w-8 h-8 rounded-full bg-orange-50 border border-white shadow-sm"></button>
    </div>

    <script>
        const colors = ['#f1f5f9', '#f0fdf4', '#f5f3ff', '#fff7ed', '#ecfeff', '#fdf2f8'];
        const phrases = [
            "inhale peace",
            "exhale tension",
            "you are safe",
            "slow down",
            "nothing to do",
            "nowhere to be",
            "just this breath"
        ];
        
        let colorIndex = 0;
        let phraseIndex = 0;

        function changeColor(hex) {
            document.getElementById('bg').style.backgroundColor = hex;
        }

        // Auto-cycle atmosphere
        setInterval(() => {
            colorIndex = (colorIndex + 1) % colors.length;
            changeColor(colors[colorIndex]);
        }, 10000);

        setInterval(() => {
            phraseIndex = (phraseIndex + 1) % phrases.length;
            document.getElementById('affirmation').innerText = phrases[phraseIndex];
        }, 12000);
    </script>
</body>
</html>
